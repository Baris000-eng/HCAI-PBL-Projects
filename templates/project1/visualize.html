{% load static %}
<head>
    <meta charset="UTF-8">
    <title>Project 1 Visualization</title>
    <link rel="stylesheet" href="{% static 'visualize.css' %}">
</head>

{% block content %}
<div class="visualization-container">
    <h2>Data Visualization</h2>
    
    <div class="chart-container">
        <canvas id="myChart"></canvas>
    </div>

    <div class="controls-wrapper">
        <div>
            <label class="axis-label">X Axis:</label>
            <select id="xColumn" class="axis-select" onchange="drawChart()">
                {% for col in columns %}
                    <option value="{{ forloop.counter0 }}">{{ col }}</option>
                {% endfor %}
            </select>
        </div>
        <div>
            <label class="axis-label">Y Axis:</label>
            <select id="yColumn" class="axis-select" onchange="drawChart()">
                {% for col in columns %}
                    <option value="{{ forloop.counter0 }}" {% if forloop.counter == 2 %}selected{% endif %}>{{ col }}</option>
                {% endfor %}
            </select>
        </div>
    </div>

    <hr class="divider">
    
    <div class="footer-container">
        <form action="{% url 'project1:train' %}" method="GET">
            <button type="submit" class="button">Proceed to Machine Learning Model Training</button>
        </form>
    </div>
</div>

<script id="data-json" type="application/json">{{ full_data|safe }}</script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="{% static 'visualize.js' %}"></script>
{% endblock %}
