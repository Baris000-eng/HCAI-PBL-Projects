{% load static %}
<head>
    <link rel="stylesheet" href="{% static 'train.css' %}">
</head>

{% block content %}
<div class="train-config-container">
    <h2 class="config-title">Machine Learning Model Configuration</h2>
    
    <form method="post" action="{% url 'project1:train' %}">
        {% csrf_token %}
        <div class="form-group">
            <label class="label-text">Model Type:</label>
            <select name="model_type" class="select-input">
                <option value="rfc">Random Forest Classifier</option>
                <option value="dtc">Decision Tree Classifier</option>
                <option value="svm">Support Vector Machine Classifier</option>
                <option value="knn">K-Nearest Neighbors Classifier</option>
                <option value="log_reg">Logistic Regression</option>
            </select>
        </div>

        <div class="range-container">
            <label class="label-text">Test Data Split Ratio:</label>
            <input type="range" name="split_ratio" min="0.1" max="0.8" step="0.05" value="0.2" 
                   oninput="this.nextElementSibling.value = (this.value * 100).toFixed(0) + '%'">
            <output>20%</output>
        </div>

        <div class="metrics-section">
            <label class="label-text">Select Evaluation Metrics:</label>
            <div class="metrics-wrapper">
                <label class="checkbox-item"><input type="checkbox" name="metrics" value="accuracy"> Accuracy</label>
                <label class="checkbox-item"><input type="checkbox" name="metrics" value="precision"> Precision</label>
                <label class="checkbox-item"><input type="checkbox" name="metrics" value="recall"> Recall</label>
                <label class="checkbox-item"><input type="checkbox" name="metrics" value="f1_score"> F1-Score</label>
                <label class="checkbox-item"><input type="checkbox" name="metrics" value="confusion_matrix"> Confusion Matrix</label>
                <label class="checkbox-item"><input type="checkbox" name="metrics" value="classification_report"> Classification Report</label>
            </div>
        </div>

        <div class="submit-container">
            <button type="submit" class="train-button">Start Training The Model</button>
        </div>
    </form>
</div>
{% endblock %}
